<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<title>HappyBuy Cart System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #cadaf1;
}

.navbar-nav {
    margin-left: auto;
    margin-right: 30px;
    gap: 20px;
}

.dropdown-menu {
    max-height: 300px;
    overflow-y: auto;
}

.card {
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
}
.card img {
    height: 200px;
    object-fit: cover;
}

.cart-modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.5);
}

.cart-modal-content {
    background-color: #fff;
    margin: 10% auto;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 500px;
    animation: fadeIn 0.3s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

.cart-items div {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f1f1f1;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 5px;
}
.cart-items input {
    width: 60px;
}
.cart-items button {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
}

.checkout-btn {
    background-color: #28a745;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg bg-light shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">HappyBuy</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>

        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle position-relative" href="#" role="button" data-bs-toggle="dropdown">Cart
            <span id="cartCount" class="badge bg-danger position-absolute top-0 start-100 translate-middle">0</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end p-3" style="width:300px;">
                <div id="cartItems"></div>
                <hr>
                <p class="mb-1">Items: <span id="totalItems">0</span></p>
                <p>Total: ₹<span id="totalPrice">0.00</span></p>
                <button class="btn btn-success w-100 mt-2" onclick="checkout()">Checkout</button>
            </div>
        </li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
    <h2 class="text-center mb-4">🛍️ Products</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="download.jpg" class="card-img-top" alt="Product 1">
                <div class="card-body text-center">
                    <h5>Product 1</h5>
                    <p>₹100</p>
                    <button class="btn btn-primary" onclick="addToCart('Product 1', 100, 1)">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="fruits.jpg" class="card-img-top" alt="Product 2">
                <div class="card-body text-center">
                    <h5>Product 2</h5>
                    <p>₹200</p>
                    <button class="btn btn-primary" onclick="addToCart('Product 2', 200, 1)">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="veges.jpg" class="card-img-top" alt="Product 3">
                <div class="card-body text-center">
                    <h5>Product 3</h5>
                    <p>₹300</p>
                    <button class="btn btn-primary" onclick="addToCart('Product 3', 300, 1)">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price, quantity){
    const index = cart.findIndex(item => item.name === name);

    if(index !== -1){
        cart[index].quantity += quantity;
    } else {
        cart.push({name, price, quantity});
    }

    displayCart();
}

function removeFromCart(name){
    cart = cart.filter(item => item.name !== name);
    displayCart();
}

function updateQuantity(name, quantity){
    quantity = parseInt(quantity);

    const index = cart.findIndex(item => item.name === name);

    if(index !== -1){
        cart[index].quantity = quantity;

        if(quantity <= 0){
            removeFromCart(name);
        }
    }

    displayCart();
}

function displayCart(){
    const container = document.getElementById("cartItems");
    const totalItems = document.getElementById("totalItems");
    const totalPrice = document.getElementById("totalPrice");
    const cartCount = document.getElementById("cartCount");

    container.innerHTML = "";

    if(cart.length === 0){
        container.innerHTML = "<p class='text-center'>Cart is empty</p>";
        totalItems.textContent = 0;
        totalPrice.textContent = "0.00";
        cartCount.textContent = 0;
        return;
    }

    let itemCount = 0;
    let totalCost = 0;

    cart.forEach(item => {
        const itemTotal = item.price * item.quantity;

        itemCount += item.quantity;
        totalCost += itemTotal;

        const div = document.createElement("div");

        div.classList.add("d-flex","justify-content-between","align-items-center","mb-2");

        div.innerHTML = `
            <div>
                <small>${item.name}</small><br>
                <small>₹${item.price} x ${item.quantity}</small>
            </div>

            <div>
                <input type="number" value="${item.quantity}" min="1"
                style="width:50px"
                onchange="updateQuantity('${item.name}', this.value)">
                
                <button class="btn btn-sm btn-danger" onclick="removeFromCart('${item.name}')">X</button>
            </div>
        `;

        container.appendChild(div);
    });

    totalItems.textContent = itemCount;
    totalPrice.textContent = totalCost.toFixed(2);
    cartCount.textContent = itemCount;

    localStorage.setItem("cart", JSON.stringify(cart));
}

function checkout(){
    if(cart.length === 0){
        alert("Cart is empty!");
        return;
    }

    alert("Order placed successfully!");

    cart = [];
    localStorage.removeItem("cart");
    displayCart();
}

displayCart();

</script>

</body>
</html>
