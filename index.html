<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="CartSystem.js"></script>
<link rel="stylesheet" href="Style.css">
<title>HappyBuy Cart System</title>

</head>

<body>

<nav class="navbar navbar-expand-lg bg-light shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">HappyBuy</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>

        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle position-relative" href="#" role="button" data-bs-toggle="dropdown">Cart
            <span id="cartCount" class="badge bg-danger position-absolute top-0 start-100 translate-middle">0</span>
            </a>
            <div class="dropdown-menu dropdown-menu-end p-3" style="width:300px;">
                <div id="cartItems"></div>
                <hr>
                <p class="mb-1">Items: <span id="totalItems">0</span></p>
                <p>Total: ₹<span id="totalPrice">0.00</span></p>
                <button class="btn btn-success w-100 mt-2" onclick="checkout()">Checkout</button>
            </div>
        </li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
    <h2 class="text-center mb-4">🛍️ Products</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="download.jpg" class="card-img-top" alt="Product 1">
                <div class="card-body text-center">
                    <h5>Product 1</h5>
                    <p>₹100</p>
                    <button class="btn btn-primary" onclick="addToCart('Product 1', 100, 1)">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="fruits.jpg" class="card-img-top" alt="Product 2">
                <div class="card-body text-center">
                    <h5>Product 2</h5>
                    <p>₹200</p>
                    <button class="btn btn-primary" onclick="addToCart('Product 2', 200, 1)">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="veges.jpg" class="card-img-top" alt="Product 3">
                <div class="card-body text-center">
                    <h5>Product 3</h5>
                    <p>₹300</p>
                    <button class="btn btn-primary" onclick="addToCart('Product 3', 300, 1)">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
